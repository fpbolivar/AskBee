name: ask_bee
description: "AskBee - Your friendly AI learning companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^5.0.0

  # Payments
  purchases_flutter: ^8.0.0

  # Push Notifications
  firebase_messaging: ^15.2.0

  # Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # HTTP
  http: ^1.3.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.5

  # UUID for device tracking
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
